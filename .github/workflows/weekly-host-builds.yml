name: Weekly Host Build Cache

on:
  schedule:
    # Weekly on Sunday at 08:00 UTC.
    - cron: "0 8 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: weekly-host-build-cache
  cancel-in-progress: false

jobs:
  build-nixos-azure:
    name: Build nixos-azure closure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: disabled
          use-gha-cache: enabled

      - name: Configure Cachix
        if: ${{ env.CACHIX_CACHE_NAME != '' && env.CACHIX_AUTH_TOKEN != '' }}
        uses: cachix/cachix-action@v15
        env:
          CACHIX_CACHE_NAME: ${{ vars.CACHIX_CACHE_NAME }}
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        with:
          name: ${{ env.CACHIX_CACHE_NAME }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}

      - name: Cachix not configured
        if: ${{ env.CACHIX_CACHE_NAME == '' || env.CACHIX_AUTH_TOKEN == '' }}
        env:
          CACHIX_CACHE_NAME: ${{ vars.CACHIX_CACHE_NAME }}
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: echo "Cachix is not configured. Build will run without pushing artifacts."

      - name: Build host closure (no activation)
        run: |
          nix build --show-trace --print-build-logs \
            .#nixosConfigurations.nixos-azure.config.system.build.toplevel

  build-nixpi5:
    name: Build nixpi5 closure
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: disabled
          use-gha-cache: enabled

      - name: Configure Cachix
        if: ${{ env.CACHIX_CACHE_NAME != '' && env.CACHIX_AUTH_TOKEN != '' }}
        uses: cachix/cachix-action@v15
        env:
          CACHIX_CACHE_NAME: ${{ vars.CACHIX_CACHE_NAME }}
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        with:
          name: ${{ env.CACHIX_CACHE_NAME }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}

      - name: Cachix not configured
        if: ${{ env.CACHIX_CACHE_NAME == '' || env.CACHIX_AUTH_TOKEN == '' }}
        env:
          CACHIX_CACHE_NAME: ${{ vars.CACHIX_CACHE_NAME }}
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: echo "Cachix is not configured. Build will run without pushing artifacts."

      - name: Build host closure (no activation)
        run: |
          nix build --show-trace --print-build-logs \
            .#nixosConfigurations.nixpi5.config.system.build.toplevel