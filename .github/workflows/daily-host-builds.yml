name: Daily Host Build Cache

on:
  schedule:
    # Daily at 08:00 UTC.
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-host-build-cache
  cancel-in-progress: false

jobs:
  build-nixos-azure:
    name: Build nixos-azure closure
    runs-on: ubuntu-latest
    env:
      CACHIX_CACHE_NAME: sspeaks-nix
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: disabled
          use-gha-cache: enabled

      - name: Validate Cachix configuration
        run: |
          if [ -z "$CACHIX_AUTH_TOKEN" ]; then
            echo "Cachix is required for this workflow."
            echo "Set CACHIX_AUTH_TOKEN as a repository secret."
            exit 1
          fi

      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: ${{ env.CACHIX_CACHE_NAME }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}

      - name: Build host closure (no activation)
        run: |
          nix build --show-trace --print-build-logs --accept-flake-config \
            .#nixosConfigurations.nixos-azure.config.system.build.toplevel

  build-nixpi:
    name: Build nixpi closure
    runs-on: ubuntu-24.04-arm
    env:
      CACHIX_CACHE_NAME: sspeaks-nix
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: disabled
          use-gha-cache: enabled

      - name: Validate Cachix configuration
        run: |
          if [ -z "$CACHIX_AUTH_TOKEN" ]; then
            echo "Cachix is required for this workflow."
            echo "Set CACHIX_AUTH_TOKEN as a repository secret."
            exit 1
          fi

      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: ${{ env.CACHIX_CACHE_NAME }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}

      - name: Build host closure (no activation)
        run: |
          nix build --show-trace --print-build-logs --accept-flake-config \
            .#nixosConfigurations.nixpi.config.system.build.toplevel

  build-nixpi5:
    name: Build nixpi5 closure
    runs-on: ubuntu-24.04-arm
    env:
      CACHIX_CACHE_NAME: sspeaks-nix
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: disabled
          use-gha-cache: enabled

      - name: Validate Cachix configuration
        run: |
          if [ -z "$CACHIX_AUTH_TOKEN" ]; then
            echo "Cachix is required for this workflow."
            echo "Set CACHIX_AUTH_TOKEN as a repository secret."
            exit 1
          fi

      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: ${{ env.CACHIX_CACHE_NAME }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}

      - name: Build host closure (no activation)
        run: |
          nix build --show-trace --print-build-logs --accept-flake-config \
            .#nixosConfigurations.nixpi5.config.system.build.toplevel